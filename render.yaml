services:
  - type: web
    name: gleadsy-reply-agent
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DB_PATH
        value: /var/data/agent.db
      - key: PORT
        value: 8000
    disk:
      name: agent-data
      mountPath: /var/data
      sizeGB: 1
