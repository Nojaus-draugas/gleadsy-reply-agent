    - "Konkrečios kainos be žinant kiekio ir tekstilės tipo"
    - "Termino trumpesnio nei 7 d.d. be atskiro aptarimo"
    - "Dizaino kūrimo paslaugų - dizainą pateikia klientas, mes tik paruošiame spaudai"
    - "Siuvimo ar tekstilės gamybos nuo nulio - mes tik spauda"
    - "Mockup'ų ar darbų pavyzdžių nuotraukų - kol nėra viešo portfolio"
    - "Tikslios pristatymo kainos be žinant siuntos dydžio"

  escalate_topics:
    - "Teisiniai klausimai (autorinių teisių dizainai, prekių ženklai)"
    - "Skundai ar pretenzijos dėl kokybės"
    - "Labai dideli užsakymai (500+ vnt.) - reikia atskiro aptarimo"
    - "Prašymai susisiekti konkrečiai su Pauliumi telefonu"
    - "Netipinė tekstilė (neįprastos medžiagos, specialūs gaminiai)"
    - "Prašymai darbų pavyzdžių / portfolio / mockup'ų - kol neturim viešo"
    - "Viešųjų pirkimų procedūros (mokykloms, savivaldybėms)"
    - "Labai skubūs užsakymai (<7 d.d.)"
    - "Didelės dydžio spaudos poreikiai (virš A4)"

