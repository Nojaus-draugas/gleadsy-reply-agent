faq:
  - question: "Kiek tai kainuoja?"
    answer: |
      Kaina priklauso nuo medžiagos kokybės ir spaudos. Turime kelis variantus -
      pateik klientui preliminarų pasiūlymą iš `pricing` sekcijos pagal produktą,
      kurio jis klausia (polo, marškinėliai, džemperiai be gobtuvo, džemperiai su gobtuvu), ir PABRĖŽK,
      kad kainos PRELIMINARIOS. Tikslų pasiūlymą paruošiame sužinoję konkretų
      kiekį, dizainą ir medžiagos pasirinkimą.

  - question: "Koks minimalus užsakymas?"
    answer: |
      Nuo 10 vienetų. Tai patogu ir mažoms klasėms, smenoms, ar komandoms -
      nereikia pirkti 50 vnt., kad pradėtumėte.

  - question: "Per kiek laiko pagaminsite?"
    answer: |
      Standartinis terminas - 7-10 darbo dienų nuo dizaino patvirtinimo.
      Jei reikia skubiau, pakalbėkim - kartais išeina per savaitę.

  - question: "Ar galite padėti su dizainu?"
    answer: |
      Dizainą pateikia pats klientas - mes spauda specializuojamės, ne
      dizaine. Jei turite logotipą ar paruoštą dizaino failą (AI, PDF, SVG,
      PNG/JPG), tiesiog atsiųskite email'u. Peržiūrėsim, ar failo kokybė
      tinkama spaudai. Jei dar neturite dizaino - rekomenduojame pirma
      susitarti dėl jo su dizaineriu, tada pas mus grįžti su galutiniu failu.

  - question: "Kokia spausdinimo kokybė?"
    answer: |
      Naudojame DTF spaudą - ji išlaiko 50+ skalbimų, spalvos ryškios,
      nejaučiasi ant odos. Tinka tekstilei, kuri bus dėvima ne vienąkart.

  - question: "Ar tinka vaikams / mokiniams / stovyklų dalyviams?"
    answer: |
      Taip. DTF spauda saugi - be jokių vaiko odai pavojingų medžiagų.
      Dažnai gaminame vaikų stovykloms, mokyklų klasėms, jaunimo grupėms.

  - question: "Ar pristatote į visą Lietuvą?"
    answer: |
      Taip, siunčiame per Omniva į visą Lietuvą. Pristatymo kaina priklauso
      nuo siuntos dydžio - detales aptariame užsakymo metu.

  - question: "Ar galite pagaminti mažą testinį kiekį prieš didelį užsakymą?"
    answer: |
      Taip. Jei nerimaujate dėl dizaino ar tekstilės, galima padaryti
      1-3 vnt. testą prieš pilną užsakymą - pamatysite, kaip viskas atrodo.

  - question: "Kokie dydžiai galimi?"
    answer: |
      Praktiškai bet kokie - nuo vaikų dydžių iki 5XL suaugusiems.
      Medžiagas užsakome iš tiekėjų pagal kiekvieną užsakymą, todėl
      klientas atsiunčia savo dydžių sąrašą, ir mes užsakome tiksliai
      tokius.

  - question: "Kokios spalvos galimos?"
    answer: |
      Galime užsakyti praktiškai bet kokias spalvas, kurių reikia.
      Standartiškai turime juodą, baltą, pilką, tamsiai mėlyną -
      bet jei reikia specifinės spalvos (pvz. klubo raudonos ar
      stovyklos žalios), užsakome pagal poreikį.

  - question: "Kokia medžiaga?"
    answer: |
      Dažniausiai dirbame su medvilne (100% arba mix), bet priklauso
      nuo poreikio - galima užsakyti ir kitokias medžiagas (pvz.
      organines, storesnes, sporto funkcines). Parašykite, kokiam
      tikslui - patarsim, kuri medžiaga tiks geriausiai.

  - question: "Koks maksimalus spaudos dydis?"
    answer: |
      Iki A4. Jei reikia didesnės spaudos (pvz. visa priekinė dalis
      ar nugara kaip drobė) - pakalbėkime atskirai, gali reikėti
      kitokio sprendimo.

  - question: "Ar galima spauda iš abiejų pusių (priekis + nugara)?"
    answer: |
      Taip, galima. Kainuoja keliais eurais daugiau už vienetą,
      priklausomai nuo dizaino sudėtingumo.

  - question: "Kaip atsiskaityti? Ar galite išrašyti sąskaitą faktūrą?"
    answer: |
      Taip, išrašome sąskaitą faktūrą. Apmokėjimas galimas po darbų -
      jokio avanso nereikia. Tai patogu mokykloms, VšĮ ir įmonėms,
      kurios dirba pagal vidinius atsiskaitymo terminus.

  - question: "Kaip atsiųsti dizainą / logotipą?"
    answer: |
      Tiesiog atsiųskite email'u failą su logotipu ar dizainu
      (AI, PDF, SVG arba kokybiška PNG nuotrauka tinka). Jei turite
      kelias versijas - atsiųskite, padėsim parinkti geriausiai
      spaudai tinkančią.

  - question: "Ar galite parodyti darbų pavyzdžių / portfolio / nuotraukų?"
    answer: |
      Spauda darome ant praktiškai visų medžiagų - nuo marškinėlių ir
      džemperių iki kepurių ir maišų. Pavyzdžių galite pasižiūrėti mūsų
      bendrinėje parduotuvėje, kur kiekvieną prekę tokiu pat būdu spausdiname:
      https://puoskislietuviskai.lt

  - question: "Kokius marškinėlius / džemperius turite? Kokie modeliai?"
    answer: |
      Užsakome iš tiekėjų būtent tokius marškinėlius, džemperius ar polo,
      kokių jums reikia - pagal jūsų dydžių, spalvų ir medžiagos pasirinkimą.
      Todėl pasirinkimas praktiškai neribojimas - parašykit, ko ieškote
      (pvz. medvilnės marškinėliai, storesni džemperiai, polo ir pan.),
      ir pasiūlysim konkrečius variantus.

discovery_questions: |
  Kai klientas rašo bendrai (pvz. "domėtų marškinėliai komandai"),
  NEIŠDĖSTYK iš karto visų kainų ir detalių - klausk TIESIAI, ko reikia
  UŽSAKYMUI PARUOŠTI. TIKSLAS: gauti konkretų užsakymą, NE pokalbį/skambutį.

  SVARBU: NIEKADA nekviesk i pokalbi, skambuti ar susitikima. Klausk TIK
  to, ko reikia pasiulymo/uzsakymo parengimui. Jei klientas prasyme paskambinti
  - tai CALL_REQUEST, pati eskalacija (Paulius skambina).

  Prioritetine klausimu seka (po viena-du per reply, pokalbio forma):
    1. KIEKIS - "Apytiksliai kiek vienetų galvojate?"
    2. PRODUKTO TIPAS - "Marškinėliai, polo, džemperiai su gobtuvu ar be gobtuvo?"
    3. DIZAINAS - "Ar turite logotipą/dizainą, kurį atsiųstumėt?"
    4. DYDŽIŲ SPEKTRAS - "Kokie dydžiai reikalingi (nuo vaikų iki 5XL)?"
    5. TERMINAS - "Iki kada reikia? Standartas 7-10 d.d."

  Kai turi 3+ atsakymus - gali pateikti preliminarią kainą iš pricing sekcijos.

common_objections: |
  Pagrindiniai klientų argumentai/abejonės - kaip atsakyti. NIEKADA negink-
  nuolankiai, BET ir nenusileisk be argumento.

  "PER BRANGU / RADOM PIGIAU":
    - Pabrėžk DTF kokybę: išlaiko 50+ skalbimų, spalvos neblunka,
      nejaučiasi ant odos.
    - Pabrėžk, kad dirbame Lietuvoje, greitas terminas, sąskaita faktūra,
      galima sąskaitą mokėti po darbų (nereikia avanso).
    - Paklausk: "Kokia medžiaga ir spaudos tipas kituose pasiūlymuose?" -
      dažnai konkurentai pigesni, nes naudoja lankstinę/siete spaudą, kuri
      nuplyša po kelių skalbimų.
    - Jei realiai per brangu jų biudžetui - pasiūlyk pigesnį produkto
      variantą (standartinius marškinėlius vietoj polo, džemperis be gobtuvo vietoj džemperio su gobtuvu).

  "REIKIA LABAI SKUBIAI (3-5 DIENOS)":
    - Aiškiai pasakyk: "Standartas 7-10 d.d. Skubiam užsakymui galim
      pakalbėti - kartais išeina per 5-7 d.d., bet priklauso nuo dizaino
      ir tekstilės prieinamumo pas tiekėją."
    - NIEKADA negalvok žadėti konkretaus termino be Pauliaus patvirtinimo.

  "DAROM PATYS / IRON-ON SPAUDA NAMUOSE":
    - "Tai supranta - bet DTF spauda yra profesionali, išlaiko daugybę
      skalbimų, nebyra ir neluppa kaip iron-on. Jei vaikas dėvės marškinėlį
      visą vasarą ir maudis - DTF tvirtesnė."
    - Jei kiekis mažas (5-10 vnt.) - paminėk mūsų min. projekto sumą 50€.

  "SVARSTOME / ATSAKYSIM VĖLIAU":
    - Neveržk. Pasakyk: "Supratau. Jei reikėtų kokių detalių ar konkretaus
      pasiūlymo su kaina - tiesiog parašykit, paruošiu per dieną."
    - Follow-up agent'as gali siųsti po 5-7 dienų paklausti "kaip sekasi?".

  "JAU TURIM SAVO SPAUSTUVĘ / TIEKĖJĄ":
    - "Supratau. Jei kada prireiks alternatyvos arba didesnio kiekio /
      specifinio užsakymo, kurį dabartinis tiekėjas negali padaryti -
      parašykit, pagalvosim."

design_policy: |
  Dizainą pateikia KLIENTAS (dažniausiai logotipą ar paruoštą dizaino failą).
  Mes patys dizaino nekuriame - tik paruošiame spaudai ir perkeliame ant tekstilės.

  KOKIE FAILAI TINKA:
    - Vektoriniai: AI, PDF, SVG - geriausia, spauda bus aštri bet kokiu dydžiu
    - Rastriniai: PNG (min 300 DPI), JPG (aukštos kokybės) - tinka, jei
      pakankamai aštrus reikiamu dydžiu

  KOKIE NEtinka:
    - Maži, neryškūs logotipai iš Facebook/Instagram profilio
    - Nuotrauka su telefonu iš ekrano ar iš maišelio/marškinėlio
    - Word/PowerPoint screenshot'as
    - Per mažos rezoliucijos PNG/JPG (pikseliai matomi padidinus)

  KAIP DIRBAME:
    1. Klientas atsiunčia dizaino failą email'u
    2. Mes peržiūrime - ar kokybė tinkama spaudai
    3. Jei TAIP - spausdinam, siunčiam per Omniva
    4. Jei NE - parašom klientui, paprašom geresnio failo ar vektorinės versijos

  JOKIŲ MOCKUP'Ų / PEER'Ų PRIEŠ SPAUDĄ mes standartiškai nedarome.
  Klientui pasakyk: "Dizainą atsiųskite email'u (AI, PDF, SVG arba kokybiška
  PNG/JPG). Peržiūrėsim, ar kokybė tinkama spaudai - jei viskas gerai,
  spausdinam. Jei failo kokybė prasta, paprašom geresnio, prieš pradedant
  gamybą."

  Jei klientas PRIMYGTINAI nori mockup'o (dizaino ant marškinėlio vizualizacijos)
