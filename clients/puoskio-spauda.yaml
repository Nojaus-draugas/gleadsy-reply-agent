company_description: |
  Puoškio Spauda - lietuviška tekstilės spausdinimo įmonė. Specializuojamės DTF
  spaudoje ant marškinėlių, džemperių (su gobtuvu ir be) ir kitos tekstilės - su logotipu,
  dizainu ar individualiu sprendimu. Dirbame su mokyklomis, stovyklomis, sporto
  klubais, renginių organizatoriais ir kitais kolektyvais visoje Lietuvoje.
  Paulius - įkūrėjas, tiesiogiai bendrauja su klientais.

service_offering: |
  DTF spauda ant tekstilės: marškinėliai, džemperiai, polo.
  Nuo dizaino paruošimo spaudai iki gatavo produkto - viskas vienoje vietoje.
  Dizainą (logotipą ar pan.) klientas atsiunčia pats; mes paruošiame spaudai
  ir perkeliame ant tekstilės. Siuntimas - per Omniva į visą Lietuvą.

product_specs: |
  === PRODUKTO SPECIFIKACIJOS ===

  DYDŽIAI: praktiškai visi galimi (XS-5XL suaugusiems; vaikų dydžiai taip pat).
    Medžiagas užsakome iš tiekėjų pagal konkretų užsakymą - todėl dydžių
    spektras platus. Klientui pasakyk: "Praktiškai bet kokie dydžiai - nuo
    vaikų iki 5XL. Užsakome pagal jūsų dydžių sąrašą."

  SPALVOS: galime užsakyti praktiškai bet kokias spalvas, kurių reikia.
    Standartiškai - juoda, balta, pilka, tamsiai mėlyna; bet jei klientui
    reikia specifinės spalvos (pvz. klubo raudonos) - užsakome pagal poreikį.

  MEDŽIAGA: dažniausiai medvilnė (100% arba mix), bet priklauso nuo poreikio.
    Jei klientas nori specifiškos medžiagos (pvz. organinė, storesnė, sporto
    funkcinė) - galima užsakyti. Svoris paprastai 150-200 g/m².

  SPAUDOS DYDIS: iki A4. Jei klientui reikia didesnės spaudos (visas priekis,
    nugara "visa drobė") - pakalbėkime atskirai, gali reikėti kitokio sprendimo.

  DVIEJŲ PUSIŲ SPAUDA (priekis + nugara): galima. Kainuoja keliais eurais
    daugiau už vienetą, priklausomai nuo dizaino.

  RANKOVIŲ / KAPIŠONO SPAUDA: įmanoma, aptariame individualiai.

  BROKAS / GARANTIJA: jei kilus brokui (mūsų klaida) - perdarome nemokamai.

value_proposition: |
  Drabužiai su logotipu ar dizainu - tai, kas jungia grupę ir lieka kaip
  atsiminimas. Ar tai klasės džemperiai su gobtuvu, stovyklos marškinėliai dalyviams,
  klubo merch nariams, ar renginio dalyvio atributika - procesas tas pats:
  greitas terminas (7-10 d.d.), mažas minimumas (nuo 10 vnt.) ir kokybiška
  DTF spauda, kuri išlaiko daug skalbimų.

pricing: |
