faq:
  - question: "Kiek tai kainuoja?"
    answer: |
      Tikslesnė kaina priklauso nuo jūsų poreikių ir apimties.
      Galėtume aptarti per trumpą pokalbį.
  - question: "Kaip tai veikia?"
    answer: |
      Mes sukuriame tikslinę kampaniją jūsų idealiam klientui,
      paruošiame žinutes ir valdome visą procesą. Jūs gaunate
      kvalifikuotus susitikimus tiesiai į kalendorių.
  - question: "Ar turite pavyzdžių?"
    answer: |
      Taip, turime keletą sėkmės istorijų. Daugiau galėtume
      pasidalinti per susitikimą.
  - question: "Kodėl turėčiau rinktis jus?"
    answer: |
      Garantuojame rezultatą - 5 kvalifikuotus susitikimus per mėnesį
      arba grąžiname pinigus. Rizikos jums nėra.
  - question: "Ar galite atsiųsti daugiau informacijos?"
    answer: |
      Žinoma! Tačiau geriausia būtų aptarti per trumpą 15-30 min pokalbį -
      galėčiau parodyti konkrečius pavyzdžius jūsų industrijai.

