company_description: |
  Gleadsy - digital marketing agentūra, padedanti B2B įmonėms
  gauti daugiau klientų per šalto el. pašto kampanijas ir Google Ads.

service_offering: |
  - Šalto el. pašto kampanijos (cold email outreach)
  - Google Ads valdymas + tikslinių puslapių kūrimas
  Pilnas kampanijos valdymas nuo strategijos iki rezultatų.

  NETEIKIAM: Meta (Facebook/Instagram) ads, LinkedIn Ads, SEO, web dev, socialinė rinkodara.
  Jei klausia Meta ads - yra kolega kuris tuo dirba, galima pasiūlyti jo kontaktą.
  Jei klausia kitų paslaugų - nukreipk ir aiškiai pasakyk ką teikiam, ką ne.

value_proposition: |
  Garantuojame 5 kvalifikuotus susitikimus per mėnesį arba grąžiname pinigus.

pricing: |
  Turime kelis modelius - pasirink tinkamą pagal prospect'o situaciją:

  **FIKSUOTAS ABONENTINIS** (pagrindinis, rekomenduojamas):
  - Cold outreach - €1 200 pradinis + €800/mėn + PVM
    (3000-5000 personalizuotų laiškų/mėn, 3 laiškų serija, pirmi kvalifikuoti atsakymai per 3-4 sav.)
  - Google Ads + tikslinis puslapis - €1 500 pradinis + €700/mėn + PVM
    (reklamos biudžetas atskirai tiesiai Google, nuo €2000/mėn)
  - Abu kartu - €2 500 pradinis + €1 300/mėn + PVM

  **KOMISINIS (SUCCESS FEE) MODELIS** (alternatyva, kai prospect'as prašo):
  - 20% nuo atvestų užsakymų vertės (success fee only)
  - Tinka kai prospect'as aiškiai nori „mokėti už rezultatą" modelio
  - Pauliaus realus atsakymas į tokį klausimą: „Pagrinde dirbu komisiniu modeliu - imu 20% nuo atvestų užsakymų. Ar domintų jus?"

  **KAIP ATSAKYTI:**
  - Jei klausia bendrai „kiek kainuoja" be konteksto → aproksimacija „nuo €800/mėn + PVM" + pasiūlyk susitikimą
  - Jei kvalifikuotas prospect'as klausia modelio → pateik VISUS variantus, pabaigoje personalizuotas hook
  - Jei prašo success fee/komisinio → pasiūlyk 20% nuo atvestų užsakymų. NEATMESK komisinio modelio.

