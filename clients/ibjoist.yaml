company_description: |
  IBJOIST - lietuviška medinių I-sijų gamintoja. Gamina OSB I-sijas
  stogams, perdangoms ir sienoms. Gamyba Lietuvoje, tiekimas visoje
  Europoje, daugiausia Skandinavijos ir Vakarų Europos rinkoms.

service_offering: |
  Medinės I-sijos įvairių aukščių (H-200 iki H-450):
  - Stogų konstrukcijoms
  - Perdangų konstrukcijoms
  - Sienų rėmams
  Pilnas tiekimas nuo užsakymo iki pristatymo, gamyba iki 4 savaičių.

# Resursai - kai prospect'as prašo nuotraukų/pavyzdžių/techninės info
product_resources: |
  TURIME 2 RESURSUS:

  1) SVETAINĖS PUSLAPIS su sijų nuotraukomis ir technologijos aprašymu:
     https://ibjoist.com/lt/i-joist-technologija/
     (šio puslapio apačioje matosi visos sijų nuotraukos)

  2) PDF KAINORAŠTIS - kainos pagal metrą, H-200 iki H-450, techniniai brėžiniai.
     AUTOMATIŠKAI prisegamas jei į reply tekstą įtraukiama frazė:
     - LT: "prisegu kainoraštį" arba "prisegu PDF"
     - FR: "ci-joint le catalogue" arba "je vous joins"
     - EN: "attaching pricelist" arba "find attached"
     Sistema pati parenka teisingą kalbos PDF'ą pagal prospect'o žinutės kalbą.

  KADA KURĮ NAUDOTI (SVARBU: salina meeto/pokalbio suteikimus):

  - Jei prospect'as BEND RAI domisi kainomis (be projekto specifikos)
    → Siūsk PDF kainoraštį ("Prisegu kainoraštį") IR paklausk: "Ar tik apžvelgiate kainas ar turite konkretų objektą, kuriam reikia sijų?" - atskirs ar tikras leadas.

  - Jei prospect'as PATEIKE KONKREČIUS DUOMENIS (bent vieną iš: kiekis metrais, sijos aukštis, projekto tipas, terminas)
    → ESKALUOJAM Pauliui skaičiavimui. Draft atsakymo: "Ačiū už info. Paruošime tikslų skaičiavimą ir greit atsiųsime." NEISIGALVOTI kainų konkretaus aukščio - tik range (5,50-10,90 €/m) jei reikia bendrai paminėti.

  - Jei prospect'as prašo nuotraukų / pamatyti produktą
    → Nukreipk į svetainę: https://ibjoist.com/lt/i-joist-technologija/. NEPRIDĖK PDF'o.

  - NIEKADA NEKVIESK į pokalbį, skambutį, susitikimą. Vietoj to klausk konkrečių projekto duomenų arba siųsk PDF.

# Automated attachments - base64 native priedas per Instantly API
# Sistema skaito agent reply text + aptikta prospect'o kalba -> parenka teisingą PDF
attachments:
  pricelist:
    trigger_phrases:
      lt: ["prisegu kainorašt", "prisegu PDF", "prisegu kainoraštį", "siunčiu kainoraštį"]
      en: ["attaching pricelist", "attaching price list", "find attached", "please find attached"]
      fr: ["ci-joint", "je vous joins", "vous joins le catalogue", "vous trouverez en pièce jointe"]
    files:
      lt: "ibjoist_kainorastis_lt.pdf"
      en: "ibjoist_pricelist_en.pdf"
      fr: "ibjoist_prix_fr.pdf"
    mime_type: "application/pdf"

value_proposition: |
  I-sijos yra 40% lengvesnės nei masyvios medienos sijos, tikslių matmenų,
  netraukia, neskyla ir neišsikraipo. Tarpatramiai iki 12m be tarpinių atramų.
  Gamyba Lietuvoje - trumpi pristatymo terminai ir konkurencingos kainos.

pricing: |
  Kainų range: nuo 5,50 €/m iki 10,90 €/m (+PVM), priklauso nuo sijos aukščio.
  Pristatymas Lietuvoje aptariamas individualiai.

  SVARBU (NIEKADA nepažeisk):
  - NETURIME konkrečios kainos per-aukštis lentelės brief'e. Todėl NIEKADA
    nesakyk kliento "H-300 kainuoja 7,20 €/m" ar pan. konkretaus skaičiaus.
  - Jei klientas klausia konkretaus aukščio kainos arba pateikia projekto
    specifiką (kiekis + aukštis) - NEISSIGALVOK skaičių. Atsakyk taip:
    * "H-300 sijos patenka į 5,50-10,90 €/m range'ą. Tikslią kainą 800m
      užsakymui paskaičiuosiu šiandien iki vakaro - atsiųsiu PDF'ą ;)"
    * Arba: "Prisegu PDF katalogą su visomis aukščiais ir kainomis pagal metrą"
    * Veiksmas/pažadas > konkretus skaičius, kurio nežinai.
  - Tik range (5,50-10,90) yra saugu paminėti. Viskas kas siauriau - halucinuoti.

target_audience: |
  Statybos įmonės, stogdengiai, rangovai ir individualių namų statytojai
  Lietuvoje, kuriems reikia stogo ar perdangų sijų.

