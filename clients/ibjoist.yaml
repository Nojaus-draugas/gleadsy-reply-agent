faq:
  - question: "Kiek kainuoja I-sijos?"
    answer: |
      Kainos nuo 5,50 €/m, priklauso nuo sijos aukščio ir kiekio.
      Parašykite kokio aukščio ir kiek metrų reikia — paruošime tikslų pasiūlymą.
  - question: "Per kiek laiko pagaminsite?"
    answer: |
      Standartinis gamybos terminas — iki 4 savaičių nuo užsakymo patvirtinimo.
      Tiksliau priklauso nuo užsakymo apimties.
  - question: "Koks minimalus užsakymas?"
    answer: |
      Dirbame tiek su vienkartiniais, tiek su nuolatiniais užsakymais.
      Susisiekite — aptarsime pagal jūsų projekto poreikius.
  - question: "Ar pristatote?"
    answer: |
      Taip, pristatome visoje Lietuvoje. Pristatymo sąlygos aptariamos
      individualiai pagal užsakymą.
  - question: "Kuo I-sijos geresnės nei masyvios medienos sijos?"
    answer: |
      I-sijos 40% lengvesnės, tikslių matmenų, netraukia ir neišsikraipo.
      Galima pasiekti iki 12m tarpatramius be tarpinių atramų.
  - question: "Ar galite atsiųsti techninę dokumentaciją?"
    answer: |
      Taip, galime atsiųsti technines specifikacijas ir sertifikatus.
      Geriausia būtų aptarti per trumpą pokalbį — galėtume patarti
      tinkamiausią sprendimą jūsų projektui.

