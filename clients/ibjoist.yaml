faq:
  - question: "Kiek kainuoja I-sijos?"
    answer: |
      Kainos nuo 5,50 €/m, priklauso nuo sijos aukščio ir kiekio.
      Prisegu kainoraštį su visomis kainomis. Jei turite konkretų objektą
      (kiekis + aukštis) - parašykit ir paruošim tikslų skaičiavimą.
  - question: "Per kiek laiko pagaminsite?"
    answer: |
      Standartinis gamybos terminas - iki 4 savaičių nuo užsakymo patvirtinimo.
      Tiksliau priklauso nuo užsakymo apimties.
  - question: "Koks minimalus užsakymas?"
    answer: |
      Dirbame tiek su vienkartiniais, tiek su nuolatiniais užsakymais.
      Parašykit kiekį ir projekto tipą - patarsim ar tinkame jūsų poreikiui.
  - question: "Ar pristatote?"
    answer: |
      Taip, pristatome visoje Lietuvoje. Pristatymo sąlygos aptariamos
      individualiai pagal užsakymą.
  - question: "Kuo I-sijos geresnės nei masyvios medienos sijos?"
    answer: |
      I-sijos 40% lengvesnės, tikslių matmenų, netraukia ir neišsikraipo.
      Galima pasiekti iki 12m tarpatramius be tarpinių atramų.
  - question: "Ar galite atsiųsti techninę dokumentaciją / nuotraukų / pavyzdžių?"
    answer: |
      Taip - prisegu PDF katalogą su visomis specifikacijomis, techniniais
      brėžiniais ir sijų skerspjūviais (H-200 iki H-450).
  - question: "Ar turite CE/atitikties deklaraciją?"
    answer: |
      Atitikties deklaracijos neturime. Turime KTU bandymų protokolą ir
      sijų parinkimo lentelę, kuria vadovaujantis parenkame tinkamas sijas
      konkrečiam projektui. Jei reikia protokolo - paprašykit, atsiųsiu.
  - question: "Kaip parenkate sijas konkrečiam projektui?"
    answer: |
      Pagal sijų parinkimo lentelę (parengtą remiantis KTU bandymų protokolu).
      Atsiųskite projekto duomenis (tarpatramis, apkrova, atstumas tarp sijų)
      ir paruošim tikslų pasiūlymą su tinkamo aukščio sijomis.

